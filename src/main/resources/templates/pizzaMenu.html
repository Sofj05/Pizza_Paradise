<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pizza Menu</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<h1>Pizza Menu</h1>

<p>
    <a href="/">Back to index</a> |
    <a th:href="@{/createOrder}">Create order</a>
</p>

<div class="container">

    <!-- PIZZA GRID -->
    <div class="pizza-list">

        <div class="pizza-card" th:each="pizza : ${pizzas}">
            <h3 th:text="${pizza.name}">Pizza Name</h3>
            <p th:text="${pizza.description}">Description</p>
            <p><strong th:text="${pizza.price} + ' kr'">Price</strong></p>

            <a th:href="@{/createOrder}" class="add-btn">Order this pizza</a>
        </div>

    </div>

</div>

</body>
</html>
