<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<h1>Welcome!</h1>

<div class="container">

    <!-- LEFT SIDE: USER INFO -->
    <div class="order-box">
        <h2>User Information</h2>

        <p><strong>Name:</strong> <span th:text="${user.name}"></span></p>
        <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>

        <p style="margin-top: 20px;">
            <a th:href="@{/createOrder}">Show menu</a><br>
            <a th:href="@{/index}">Log out</a>
        </p>
    </div>
</div>
<div class="container">
    <!-- RIGHT SIDE: ALL ORDERS -->
    <div class="pizza-list" style="width: 70%;">

        <div class="pizza-card" th:each="order : ${allOrders}">
            <h3 th:text="'Order #' + ${order.id}">Order #1</h3>

            <p><strong>Pizzas:</strong>
            <div th:each="pizza : ${order.pizzas}">
                <div class="order-item">
                    <p>
                        <strong th:text="${pizza.name} + ' x ' + ${pizza.quantity}">
                            Pizza Name
                        </strong>
                    </p>
                    <p th:text="${pizza.price} + ' kr'">
                        0 kr
                    </p>
                </div>
            </div>
            <p><strong>Total:</strong> <span th:text="${order.getTotalPrice()} + ' kr'"></span></p>

            <a th:href="@{'/editOrder/' + ${order.id}}" class="add-btn">View / Edit</a>
        </div>

    </div>
</div>

</body>
</html>
